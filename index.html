<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diabetes Prediction</title>
</head>
<body>
  <h2>Diabetes Prediction</h2>
  <form id="predictionForm">
    Gender: <input type="text" name="gender" placeholder="Male/Female" required><br>
    Age: <input type="number" name="age" required><br>
    Hypertension (0/1): <input type="number" name="hypertension" required><br>
    Heart Disease (0/1): <input type="number" name="heart_disease" required><br>
    Smoking History: <input type="text" name="smoking_history" placeholder="never, current, etc." required><br>
    BMI: <input type="number" step="0.1" name="bmi" required><br>
    HbA1c Level: <input type="number" step="0.1" name="hba1c_level" required><br>
    Blood Glucose Level: <input type="number" step="0.1" name="blood_glucose_level" required><br>
    <button type="submit">Predict</button>
  </form>

  <h3>Result:</h3>
  <div id="result"></div>

  <script>
    const form = document.getElementById('predictionForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => data[key] = isNaN(value) ? value : parseFloat(value));

      try {
        const response = await fetch('http://127.0.0.1:8000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();
        document.getElementById('result').innerText = JSON.stringify(result, null, 2);
      } catch (err) {
        document.getElementById('result').innerText = 'Error: ' + err;
      }
    });
  </script>
</body>
</html>
